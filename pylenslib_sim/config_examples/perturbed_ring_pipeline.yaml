output_dir: pylenslib_outputs_perturbed_ref
n_realizations: 1
n_pixels: 500
grid_size: 0.02
x_range: [-5, 5]
y_range: [-5, 5]
image_size: 100
pixel_scale: 0.1
clusters:
  - name: PerturbedRingReference
    M200: 1e15
    c: 4.0
    z: 0.5
    n_subhalos: 0
    subhalo_mass_range: [5e8, 5e10]
    pylenslib_models:
      fov_half_arcsec: 5.0
      main:
        profile: piemd
        sigma0: 240.0
        q: 0.75
        pa: 0.5235987756
        theta_c: 0.01
        theta_t: 4.0
        x1: 0.0
        x2: 0.0
      satellites:
        profile: sie
        n: 6
        sigma0: 60.0
        radius_arcsec: 1.5
        phase_offset: 0.35
        q_min: 0.85
        q_max: 0.95
        theta_c: 0.001
      dm_subhalos:
        profile: nfwell
        n: 20
        mass_min: 5e8
        mass_max: 5e10
        shmf_slope: -0.9
        conc_min: 10.0
        conc_max: 25.0
        r_min_arcsec: 0.2
        r_max_arcsec: 4.5
sources:
  n_sources: 3
  region_size_arcmin: 0.5
  redshift: 1.2
  density_per_arcmin2: 50
  explicit:
    - x: 0.09
      y: 0.02
      magnitude: 21.5
      radius_arcsec: 0.08
seed: 42
rendering:
  backend: pylenslib_direct
  npix_hires: 500
  source_n: 2.0
  source_q: 0.9
  source_pa: 0.5
  include_lens_light: true
  lens_light_n: 4.0
  lens_light_re: 1.5
  observation:
    zp: 23.9
    texp: 2260
    mag_sky: 22.5
