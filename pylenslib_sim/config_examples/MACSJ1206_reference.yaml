# Reproduction of MACSJ1206-like configuration from Meneghetti et al. (2020)
# This config aims to match the observational setup shown in Fig. 1 and Fig. 2
# (large field-of-view convergence maps and a central Einstein-ring-like source).

output_dir: pylenslib_outputs_paper_MACSJ1206
n_realizations: 1
n_pixels: 256
grid_size: 0.02
x_range: [-100, 100]    # field-of-view in arcsec to match figures in the paper
y_range: [-100, 100]
image_size: 800
pixel_scale: 0.2

clusters:
  - name: MACSJ1206_reference
    # Approximate global halo properties representative of a massive HST lens
    M200: 1.2e15           # Msun (order-of-magnitude for MACSJ1206-like cluster)
    c: 4.5                # concentration parameter (typical for massive clusters)
    z: 0.439              # lens redshift reported for MACSJ1206 in the paper
    n_subhalos: 50       # large number of subhalos to reproduce observed abundance
    subhalo_mass_range: [1e9, 1e12]
    pylenslib_models:
      fov_half_arcsec: 100.0
      main:
        profile: piemd
        sigma0: 300.0      # km/s central velocity dispersion (tunable)
        q: 0.9
        pa: 0.0
        theta_c: 0.001
        theta_t: 50.0
        x1: 0.0
        x2: 0.0
      dm_subhalos:
        profile: nfwell
        n: 50
        mass_min: 1e9
        mass_max: 1e12
        shmf_slope: -0.9
        conc_min: 8.0
        conc_max: 30.0
        r_min_arcsec: 0.5
        r_max_arcsec: 80.0

# Sources include an explicit near-central source producing an Einstein-ring-like
# image at z ~ 1.425 (panel B in the paper), plus additional higher-redshift
# sources placed closer to the strong-lensing region so they shear into arcs
# rather than appearing as isolated spots.
sources:
  n_sources: 50
  region_size_arcmin: 2.0
  redshift: 1.85
  density_per_arcmin2: 5
  # explicit:
  #   - x: 0.0
  #     y: 0.0
  #     magnitude: 22.0
  #     radius_arcsec: 0.08
  #     redshift: 1.425
  #   - x: 1.6
  #     y: -1.2
  #     magnitude: 23.6
  #     radius_arcsec: 0.06
  #     redshift: 3.753
  #   - x: -2.0
  #     y: 1.8
  #     magnitude: 23.3
  #     radius_arcsec: 0.05
  #     redshift: 4.996

seed: 2020

rendering:
  backend: pylenslib_direct
  npix_hires: 1600
  source_n: 2.0
  source_q: 0.9
  source_pa: 0.0
  include_lens_light: true
  lens_light_n: 4.0
  lens_light_re: 1.2
  zoom_arcsec: 100.0      # show the full 200" field used in figures
  psf_fwhm: 0.18          # HST-like sharp PSF (arcsec)
  readnoise: 4.0
  gain: 1.0
  observation:
    zp: 26.3
    texp: 1200
    mag_sky: 22.0

detection:
  threshold_rel: 0.12
  min_pixels: 20
  elongation: 3.0

mpi:
  split_mode: source #or image or source

notes: |
  This configuration attempts to reproduce the large field convergence and
  the presence of compact substructures and central Einstein-ring-like
  images similar to Meneghetti et al. (2020) Fig. 1 and Fig. 2. It is meant
  as a starting point for validation; parameters (M200, c, sigma0, subhalo
  counts and masses) should be tuned to match a particular mass model
  realization or LENSTOOL input if an exact reproduction is desired.
