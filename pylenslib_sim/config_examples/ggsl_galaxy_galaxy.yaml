      y: 0.02
      magnitude: 23.3
      radius_arcsec: 0.06
seed: 42
rendering:
  backend: pylenslib_direct
  npix_hires: 500
  source_n: 2.0
  source_q: 0.9
  source_pa: 0.5
  include_lens_light: true
  lens_light_n: 4.0
