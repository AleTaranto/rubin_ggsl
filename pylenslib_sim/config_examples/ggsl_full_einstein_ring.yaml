output_dir: pylenslib_outputs_ggsl_ring
n_realizations: 1
n_pixels: 600
grid_size: 0.02
x_range: [-5, 5]
y_range: [-5, 5]
image_size: 200
pixel_scale: 0.05
clusters:
  - name: GGSLFullEinstein
    M200: 5e14
    c: 4.0
    z: 0.5
    n_subhalos: 0
    subhalo_mass_range: [5e8, 5e10]
    pylenslib_models:
      fov_half_arcsec: 5.0
      main:
        profile: piemd
        sigma0: 300.0
        q: 0.98
        pa: 0.0
        theta_c: 0.001
        theta_t: 5.0
        x1: 0.0
        x2: 0.0
sources:
  n_sources: 1
  region_size_arcmin: 0.02
  redshift: 2.0
  density_per_arcmin2: 0
  explicit:
    - x: 0.02
      y: 0.00
      magnitude: 21.0
      radius_arcsec: 0.03
seed: 2026
rendering:
  backend: pylenslib_direct
  npix_hires: 1000
  source_n: 1.5
  source_q: 0.95
  source_pa: 0.0
  include_lens_light: true
  lens_light_n: 4.0
  lens_light_re: 0.8
  observation:
    zp: 24.5
    texp: 1800
    mag_sky: 21.0
    psf_fwhm: 0.5
