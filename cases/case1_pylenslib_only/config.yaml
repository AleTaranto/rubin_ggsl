# Case 1: PyLensLib-only GGSL Simulation Configuration
# 
# This configuration defines:
# - Main cluster halo mass and concentration
# - Subhalo populations
# - Background source distribution
# - Simulation grid parameters
# - Output settings

cluster:
  name: ExampleCluster
  random_seed: 42
  
  main_halo:
    M200: 1.0e15  # Solar masses
    concentration: 4.0
    redshift: 0.3
  
  # Subhalos: define positions and masses
  subhalos:
    - M200: 1.0e12
      concentration: 4.0
      redshift: 0.3
      position: [50.0, 0.0]
    
    - M200: 5.0e11
      concentration: 4.0
      redshift: 0.3
      position: [-30.0, 40.0]
    
    - M200: 3.0e11
      concentration: 4.0
      redshift: 0.3
      position: [20.0, -50.0]

# Simulation grid and computational parameters
simulation:
  grid_size: 0.05  # arcsec or kpc
  x_range: [-150, 150]  # arcsec
  y_range: [-150, 150]  # arcsec
  n_pixels: 100  # resolution

# Background source population
sources:
  redshift: 1.0
  n_sources: 20
  random_seed: 42
  density_per_arcmin2: 50
  region_size: 5  # arcsec
  magnitude_min: 18
  magnitude_max: 24
  radius_min: 0.05  # arcsec
  radius_max: 0.3   # arcsec

# Mock image generation
images:
  size: 256  # pixels per side
  pixel_scale: 0.2  # arcsec/pixel

# Output settings
output:
  format: npz  # or fits
  save_lensing_maps: true
  save_critical_lines: true
