# Case 1 Example: Small Cluster Configuration
# Light-weight configuration for testing

cluster:
  name: SmallCluster
  random_seed: 123
  
  main_halo:
    M200: 5.0e14
    concentration: 3.5
    redshift: 0.3
  
  subhalos:
    - M200: 5.0e11
      concentration: 4.0
      redshift: 0.3
      position: [30.0, 20.0]

simulation:
  grid_size: 0.05
  x_range: [-100, 100]
  y_range: [-100, 100]
  n_pixels: 50

sources:
  redshift: 1.0
  n_sources: 5
  random_seed: 123
  density_per_arcmin2: 30
  region_size: 3
  magnitude_min: 19
  magnitude_max: 22
  radius_min: 0.05
  radius_max: 0.2

images:
  size: 128
  pixel_scale: 0.2

output:
  format: npz
  save_lensing_maps: true
  save_critical_lines: true
