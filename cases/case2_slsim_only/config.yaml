# Case 2: SLSim-only GGSL Simulation Configuration
#
# This configuration uses SLSim for everything:
# - End-to-end strong lensing simulation
# - Built-in lensing computations
# - Rubin-like observational effects
# - GGSL event detection

cluster:
  name: SLSimCluster
  random_seed: 42
  
  main_halo:
    M200: 1.0e15
    concentration: 4.0
    redshift: 0.3
  
  subhalos:
    - M200: 1.0e12
      concentration: 4.0
      redshift: 0.3
      position: [50.0, 0.0]
    
    - M200: 5.0e11
      concentration: 4.0
      redshift: 0.3
      position: [-30.0, 40.0]

simulation:
  grid_size: 0.05
  x_range: [-150, 150]
  y_range: [-150, 150]
  n_pixels: 100

sources:
  redshift: 1.0
  n_sources: 15
  random_seed: 42
  density_per_arcmin2: 40
  region_size: 5
  magnitude_min: 18
  magnitude_max: 24
  radius_min: 0.05
  radius_max: 0.3

images:
  size: 256
  pixel_scale: 0.2

# SLSim-specific rubinization effects
rubinization:
  psf_sigma: 0.7
  read_noise_e: 10
  sky_brightness_mag: 22
  gain: 3.0
  use_slsim_psf: false

output:
  format: npz
  save_lensing_maps: true
  save_mock_vs_rubinized: true
